name: Update Dependency Lock

'on':
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  update-lock:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update dependency lock file
        run: |
          ./update-dependency-lock.sh

      - name: Commit and push when lock changes
        run: |
          if git diff --quiet -- dependencies.lock; then
            echo "No dependency updates"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dependencies.lock
          git commit -m "chore: update dependency lock"
          git push
