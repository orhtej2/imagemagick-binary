name: Build and Publish ImageMagick Binaries

on:
  schedule:
    # Run every 8 hours
    - cron: '0 */8 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if tag exists'
        required: false
        default: false
        type: boolean
      release_tag:
        description: 'Specific release tag to build (leave empty for latest)'
        required: false
        type: string

jobs:
  check-and-build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      should_build: ${{ steps.check-release.outputs.should_build }}
      release_tag: ${{ steps.check-release.outputs.release_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new ImageMagick release
        id: check-release
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
          MANUAL_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          # Use manually specified tag if provided, otherwise get latest
          if [ -n "$MANUAL_TAG" ]; then
            LATEST_RELEASE="$MANUAL_TAG"
            echo "Using manually specified release: $LATEST_RELEASE"
          else
            LATEST_RELEASE=$(gh api repos/ImageMagick/ImageMagick/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
          fi
          
          if [ -z "$LATEST_RELEASE" ]; then
            echo "Failed to fetch latest release"
            exit 1
          fi
          
          echo "Latest ImageMagick release: $LATEST_RELEASE"
          echo "release_tag=$LATEST_RELEASE" >> $GITHUB_OUTPUT
          
          # Check if tag exists in this repo
          if git rev-parse "$LATEST_RELEASE" >/dev/null 2>&1; then
            echo "Tag $LATEST_RELEASE already exists in this repo"
            ARTIFACTS_EXIST=true
            if [ "$ARTIFACTS_EXIST" = true ] && [ "$FORCE_BUILD" != "true" ]; then
              echo "should_build=false" >> $GITHUB_OUTPUT
              echo "All artifacts exist, skipping build"
              exit 0
            fi
          fi
          
          echo "should_build=true" >> $GITHUB_OUTPUT

  build-amd64:
    needs: check-and-build
    if: needs.check-and-build.outputs.should_build == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout ImageMagick
        uses: actions/checkout@v4
        with:
          repository: ImageMagick/ImageMagick
          ref: ${{ needs.check-and-build.outputs.release_tag }}

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxcb1-dev \
            zlib1g-dev \
            libjpeg-dev \
            libpng-dev \
            libwebp-dev \
            libtiff-dev \
            libfreetype6-dev \
            libfontconfig1-dev

      - name: Configure ImageMagick for amd64
        run: |
          ./configure \
            --prefix=/usr/local/imagemagick-amd64 \
            --enable-shared \
            --disable-static \
            --with-quantum-depth=16 \
            --enable-hdri \
            --with-magick-plus-plus

      - name: Build ImageMagick for amd64
        run: make -j$(nproc)

      - name: Install ImageMagick for amd64
        run: |
          mkdir -p /tmp/build/amd64
          make install DESTDIR=/tmp/build/amd64

      - name: Create amd64 tarball
        run: |
          cd /tmp/build/amd64
          tar -czf /tmp/imagemagick-${{ needs.check-and-build.outputs.release_tag }}-linux-amd64.tar.gz .
          ls -lh /tmp/imagemagick-*.tar.gz

      - name: Upload amd64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: imagemagick-amd64
          path: /tmp/imagemagick-${{ needs.check-and-build.outputs.release_tag }}-linux-amd64.tar.gz
          retention-days: 30

  build-arm64:
    needs: check-and-build
    if: needs.check-and-build.outputs.should_build == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3

      - name: Checkout ImageMagick
        uses: actions/checkout@v4
        with:
          repository: ImageMagick/ImageMagick
          ref: ${{ needs.check-and-build.outputs.release_tag }}

      - name: Build ImageMagick for arm64 using Docker
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -v /tmp/build:/tmp/build \
            --platform linux/arm64 \
            ubuntu:22.04 bash -c "
              cd /src
              apt-get update
              apt-get install -y \
                build-essential \
                pkg-config \
                libx11-dev \
                libxext-dev \
                libxcb1-dev \
                zlib1g-dev \
                libjpeg-dev \
                libpng-dev \
                libwebp-dev \
                libtiff-dev \
                libfreetype6-dev \
                libfontconfig1-dev
              ./configure \
                --prefix=/usr/local/imagemagick-arm64 \
                --enable-shared \
                --disable-static \
                --with-quantum-depth=16 \
                --enable-hdri \
                --with-magick-plus-plus
              make -j\$(nproc)
              mkdir -p /tmp/build/arm64
              make install DESTDIR=/tmp/build/arm64
            "

      - name: Create arm64 tarball
        run: |
          cd /tmp/build/arm64
          tar -czf /tmp/imagemagick-${{ needs.check-and-build.outputs.release_tag }}-linux-arm64.tar.gz .
          ls -lh /tmp/imagemagick-*.tar.gz

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: imagemagick-arm64
          path: /tmp/imagemagick-${{ needs.check-and-build.outputs.release_tag }}-linux-arm64.tar.gz
          retention-days: 30

  publish:
    needs: [check-and-build, build-amd64, build-arm64]
    if: needs.check-and-build.outputs.should_build == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: imagemagick-amd64
          path: /tmp/artifacts

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: imagemagick-arm64
          path: /tmp/artifacts

      - name: Create release and upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="${{ needs.check-and-build.outputs.release_tag }}"
          
          # Check if release already exists
          if gh release view "$RELEASE_TAG" &>/dev/null; then
            echo "Release $RELEASE_TAG already exists, uploading artifacts..."
            gh release upload "$RELEASE_TAG" /tmp/artifacts/* --clobber
          else
            echo "Creating new release $RELEASE_TAG..."
            gh release create "$RELEASE_TAG" \
              --title "ImageMagick $RELEASE_TAG" \
              --notes "Built binaries for ImageMagick $RELEASE_TAG on Ubuntu 22.04" \
              /tmp/artifacts/*
          fi

      - name: Create tag in this repository
        if: success()
        run: |
          RELEASE_TAG="${{ needs.check-and-build.outputs.release_tag }}"
          git tag "$RELEASE_TAG" || true
          git push origin --tags || true