name: Build ImageMagick Binary

'on':
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build latest static binary
        run: |
          set -euxo pipefail
          chmod +x ./build.sh
          ./build.sh latest amd64

      - name: Validate built artifacts
        run: |
          set -euxo pipefail
          echo "Runner: $(lsb_release -ds || true)"
          archive="$(ls -1 build/imagemagick-*-linux-amd64.tar.gz | head -n 1)"
          test -n "$archive"
          ls -lh "$archive"

          temp_dir="$(mktemp -d)"
          tar -xzf "$archive" -C "$temp_dir"
          convert_bin="$(find "$temp_dir" -type f -path '*/bin/convert' | head -n 1)"
          test -n "$convert_bin"

          file "$convert_bin"
          file "$convert_bin" | grep -q 'statically linked'
          ldd "$convert_bin" || true
